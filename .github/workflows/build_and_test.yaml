name: Run tests on push / PR

on:
  push:
  pull_request:

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
      # Enter the OS to use
      # And the version of Blender to install
        os: ['ubuntu-latest','windows-latest', 'macos-latest']
        blender_version: ['5.1.2']
    runs-on: ${{ matrix.os }}

    steps:
      # Brady's Blender Install
    - uses: actions/checkout@v5
    - name: Install Blender
      uses: bradyajohnston/setup-blender@v5
      with:
        version: ${{ matrix.blender_version }}

      # Install uv 
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      # uv lockfile ensures we use the custom opencamlib wheel
    - name: Install the project with lockfile dev dependencies
      run: uv sync --locked --all-extras --dev

      # uv allows the use of pytest
    - name: Run tests
      run: uv run pytest --ignore=blender -vvv

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blendercam-${{ matrix.os }}-${{ matrix.blender_version }}
        path: ./fabex
